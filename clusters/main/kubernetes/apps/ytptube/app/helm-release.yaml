---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ytptube
  namespace: ytptube
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.14.5
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    global:
      stopAll: false    
    TZ: Europe/Brussels
    resources:
      requests:
        cpu: 10m
    image:
      repository: ghcr.io/arabcoders/ytptube
      pullPolicy: IfNotPresent
      tag: v2.6.1@sha256:895b22788253c751f1200cf4dc9bf9bcef973e2b24f528242c5b3010c41a5132    
    service:
      main:
        ports:
          main:
            port: 8081 
    credentials:
      s3:
        type: s3
        url: "${S3URL}"
        bucket: "${S3PREFIX}-ytptube"
        accessKey: "${S3ID}"
        secretKey: "${S3KEY}"
        encrKey: "${S3KEY}" 
    persistence:
      config:
        enabled: true
        mountPath: /config
        volsync:
          - name: b2
            type: restic
            credentials: s3
            dest:
              enabled: true                          
            src:
              enabled: true
              trigger:
                schedule: 1 6 * * *
      downloads:
        enabled: true
        path: /mnt/main/Media/temp
        mountPath: /downloads
        server: 192.168.1.49
        type: nfs          
    cnpg:
      main:
        enabled: false
    redis:
      enabled: false
    ingress:
        main:
          enabled: true
          ingressClassName: internal
          integrations:
            traefik:
              enabled: false
            certManager:
              enabled: true
              certificateIssuer: domain-0-le-prod
            nginx:
              enabled: true  
          hosts:
            - host: ytptube.${DOMAIN_0}
              paths:
                - path: /
                  pathType: Prefix